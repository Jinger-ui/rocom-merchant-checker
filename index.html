<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>洛克王国旅行商人查询</title>
<style>
/* ========== 主题变量 ========== */
:root {
  --bg-blue: #dff3ff;
  --bg-purple: #eee4ff;
  --cream: #fff8e7;
  --gold: #f5c542;
  --gold-dark: #d4a017;
  --deep-blue: #2f4a7d;
  --magic-purple: #8b6ff6;
  --magic-purple-light: #b8a4f8;
  --card-white: rgba(255, 255, 255, 0.76);
  --card-hover: rgba(255, 255, 255, 0.9);
  --parchment: #fff8e7;
  --gem-blue: #4a90d9;
  --text-dark: #2c3e6b;
  --text-brown: #8b6914;
  --text-muted: #7a8bb5;
  --error-red: #e07070;
  --error-bg: rgba(224, 112, 112, 0.1);
  --success-green: #5cb85c;
  --shadow-soft: 0 8px 32px rgba(47, 74, 125, 0.12);
  --shadow-card: 0 4px 20px rgba(139, 111, 246, 0.1);
  --shadow-glow: 0 0 20px rgba(139, 111, 246, 0.3);
  --radius: 16px;
  --radius-sm: 10px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ========== 全局重置 ========== */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--text-dark);
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  background: var(--bg-blue);
}

/* ========== 背景层 ========== */
.bg-layer {
  position: fixed;
  inset: 0;
  z-index: -3;
  background: url('background.png') center bottom / cover no-repeat fixed;
}

.bg-overlay {
  position: fixed;
  inset: 0;
  z-index: -2;
  background: linear-gradient(
    170deg,
    rgba(223, 243, 255, 0.55) 0%,
    rgba(238, 228, 255, 0.45) 40%,
    rgba(255, 248, 231, 0.40) 70%,
    rgba(223, 243, 255, 0.50) 100%
  );
}

/* ========== 梦幻光斑 ========== */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  z-index: -1;
  pointer-events: none;
  animation: orbFloat 12s ease-in-out infinite;
}
.orb-1 {
  width: 400px; height: 400px;
  top: -100px; left: -80px;
  background: radial-gradient(circle, rgba(139,111,246,0.22), transparent 70%);
  animation-delay: 0s;
}
.orb-2 {
  width: 350px; height: 350px;
  top: 30%; right: -60px;
  background: radial-gradient(circle, rgba(74,144,217,0.18), transparent 70%);
  animation-delay: -4s;
  animation-duration: 15s;
}
.orb-3 {
  width: 300px; height: 300px;
  bottom: 10%; left: 20%;
  background: radial-gradient(circle, rgba(245,197,66,0.15), transparent 70%);
  animation-delay: -8s;
  animation-duration: 18s;
}

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33% { transform: translate(30px, -20px) scale(1.05); }
  66% { transform: translate(-20px, 15px) scale(0.95); }
}

/* ========== 漂浮魔法粒子 ========== */
.particles {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  overflow: hidden;
}
.particle {
  position: absolute;
  border-radius: 50%;
  animation: particleFloat linear infinite;
  opacity: 0;
}
.particle--star {
  width: 4px; height: 4px;
  background: var(--gold);
  box-shadow: 0 0 6px var(--gold), 0 0 12px rgba(245,197,66,0.4);
}
.particle--dot {
  width: 3px; height: 3px;
  background: var(--magic-purple-light);
  box-shadow: 0 0 8px var(--magic-purple-light);
}
.particle--sparkle {
  width: 2px; height: 2px;
  background: #fff;
  box-shadow: 0 0 4px #fff, 0 0 8px rgba(255,255,255,0.6);
}

@keyframes particleFloat {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 0.8; }
  90% { opacity: 0.8; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* ========== 主容器 ========== */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px 40px;
  position: relative;
}

/* ========== Hero 区域 ========== */
.hero {
  text-align: center;
  padding: 48px 20px 36px;
  position: relative;
}

.hero-title {
  font-size: 2.4em;
  font-weight: 800;
  background: linear-gradient(135deg, var(--deep-blue), var(--magic-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 2px;
  margin-bottom: 12px;
  position: relative;
  display: inline-block;
}

.hero-title::before,
.hero-title::after {
  content: '✦';
  position: absolute;
  -webkit-text-fill-color: var(--gold);
  font-size: 0.4em;
  animation: twinkle 2s ease-in-out infinite;
}
.hero-title::before {
  top: -8px; left: -28px;
  animation-delay: 0s;
}
.hero-title::after {
  top: 4px; right: -28px;
  animation-delay: 1s;
}

@keyframes twinkle {
  0%, 100% { opacity: 0.4; transform: scale(0.8) rotate(0deg); }
  50% { opacity: 1; transform: scale(1.2) rotate(15deg); }
}

.hero-subtitle {
  font-size: 1.05em;
  color: var(--text-muted);
  font-weight: 400;
  max-width: 480px;
  margin: 0 auto;
  line-height: 1.7;
}

.hero-deco {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 18px;
  font-size: 1.2em;
  opacity: 0.6;
}
.hero-deco span {
  animation: floatDeco 3s ease-in-out infinite;
}
.hero-deco span:nth-child(1) { animation-delay: 0s; }
.hero-deco span:nth-child(2) { animation-delay: 0.5s; }
.hero-deco span:nth-child(3) { animation-delay: 1s; }
.hero-deco span:nth-child(4) { animation-delay: 1.5s; }
.hero-deco span:nth-child(5) { animation-delay: 2s; }

@keyframes floatDeco {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* ========== 信息栏 ========== */
.info-bar {
  background: var(--card-white);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: var(--radius);
  padding: 16px 24px;
  margin-bottom: 24px;
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 12px 28px;
  box-shadow: var(--shadow-card);
  font-size: 0.92em;
}

.info-item {
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--text-muted);
}
.info-item .label {
  color: var(--text-dark);
  font-weight: 600;
}
.info-item .value {
  color: var(--magic-purple);
  font-weight: 600;
}
.info-item .value--gold {
  color: var(--gold-dark);
}

/* ========== 按钮区域 ========== */
.btn-group {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}

.btn {
  padding: 14px 32px;
  border: 2px solid transparent;
  border-radius: 50px;
  font-size: 1em;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  letter-spacing: 1px;
  outline: none;
  font-family: inherit;
}

.btn-primary {
  background: linear-gradient(135deg, var(--magic-purple), var(--gem-blue));
  color: #fff;
  border-color: rgba(245,197,66,0.4);
  box-shadow: 0 4px 16px rgba(139,111,246,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
}
.btn-primary:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(139,111,246,0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  border-color: rgba(245,197,66,0.7);
}
.btn-primary:active:not(:disabled) {
  transform: scale(0.96);
}

.btn-secondary {
  background: linear-gradient(135deg, rgba(255,255,255,0.85), rgba(255,248,231,0.9));
  color: var(--deep-blue);
  border-color: rgba(139,111,246,0.3);
  box-shadow: 0 4px 12px rgba(47,74,125,0.1);
  backdrop-filter: blur(8px);
}
.btn-secondary:hover:not(:disabled) {
  transform: translateY(-2px);
  border-color: var(--magic-purple);
  box-shadow: 0 6px 20px rgba(139,111,246,0.2);
}
.btn-secondary:active:not(:disabled) {
  transform: scale(0.96);
}

.btn:disabled {
  opacity: 0.65;
  cursor: not-allowed;
  transform: none !important;
}

/* ========== Loading 动画 ========== */
.loading-container {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 48px 20px;
}
.loading-container.active { display: flex; }

.magic-spinner {
  width: 48px; height: 48px;
  position: relative;
  animation: spinnerRotate 2s linear infinite;
}
.magic-spinner::before, .magic-spinner::after {
  content: '✦';
  position: absolute;
  font-size: 22px;
  color: var(--magic-purple);
  animation: spinnerPulse 1.2s ease-in-out infinite;
}
.magic-spinner::before {
  top: 0; left: 50%;
  transform: translateX(-50%);
}
.magic-spinner::after {
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  color: var(--gold);
  animation-delay: 0.6s;
}

@keyframes spinnerRotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes spinnerPulse {
  0%, 100% { opacity: 0.4; transform: translateX(-50%) scale(0.7); }
  50% { opacity: 1; transform: translateX(-50%) scale(1.2); }
}

.loading-text {
  color: var(--text-muted);
  font-size: 0.95em;
}

/* ========== 商品网格 ========== */
.goods-section {
  display: none;
}
.goods-section.active { display: block; }

.section-label {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 1.05em;
  font-weight: 700;
  color: var(--deep-blue);
  margin-bottom: 16px;
  padding-left: 4px;
}
.section-label .icon {
  font-size: 1.2em;
}

.goods-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 18px;
  margin-bottom: 28px;
}

/* ========== 商品卡片 ========== */
.good-card {
  background: var(--card-white);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.7);
  border-radius: var(--radius);
  padding: 22px 20px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-card);
}

.good-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--magic-purple), var(--gem-blue), var(--gold));
  opacity: 0;
  transition: var(--transition);
}

.good-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 36px rgba(139,111,246,0.2), 0 0 0 1px rgba(139,111,246,0.15);
  background: var(--card-hover);
}
.good-card:hover::before {
  opacity: 1;
}

.good-card__icon {
  width: 56px; height: 56px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--bg-purple), var(--bg-blue));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6em;
  margin-bottom: 14px;
  box-shadow: 0 3px 10px rgba(139,111,246,0.12);
}

.good-card__name {
  font-size: 1.1em;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 10px;
  line-height: 1.4;
}

.good-card__meta {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.good-card__tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 0.82em;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 500;
}
.tag--time {
  background: rgba(139,111,246,0.1);
  color: var(--magic-purple);
}
.tag--limited {
  background: rgba(245,197,66,0.15);
  color: var(--gold-dark);
}
.tag--allday {
  background: rgba(74,144,217,0.1);
  color: var(--gem-blue);
}
.tag--price {
  background: rgba(245,197,66,0.12);
  color: var(--text-brown);
}
.tag--limit {
  background: rgba(92,184,92,0.1);
  color: #3d8b3d;
}
.tag--desc {
  background: rgba(47,74,125,0.06);
  color: var(--text-muted);
}

/* ========== 空状态 ========== */
.empty-state {
  background: var(--card-white);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.6);
  border-radius: var(--radius);
  padding: 52px 24px;
  text-align: center;
  box-shadow: var(--shadow-card);
}
.empty-state__icon {
  font-size: 3em;
  margin-bottom: 16px;
  opacity: 0.5;
  animation: floatDeco 4s ease-in-out infinite;
}
.empty-state__text {
  color: var(--text-muted);
  font-size: 1em;
  line-height: 1.6;
}

/* ========== 错误提示 ========== */
.error-box {
  display: none;
  background: var(--error-bg);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(224,112,112,0.25);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 24px;
  align-items: flex-start;
  gap: 12px;
}
.error-box.active { display: flex; }
.error-box__icon { font-size: 1.3em; flex-shrink: 0; margin-top: 2px; }
.error-box__content { flex: 1; }
.error-box__title {
  font-weight: 700;
  color: var(--error-red);
  margin-bottom: 4px;
}
.error-box__msg {
  color: #9e5555;
  font-size: 0.9em;
  line-height: 1.6;
}

/* ========== 调试面板 ========== */
.debug-panel {
  display: none;
  margin-top: 24px;
}
.debug-panel.active { display: block; }

.debug-toggle {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: 1px solid rgba(139,111,246,0.2);
  border-radius: 8px;
  padding: 8px 16px;
  color: var(--text-muted);
  font-size: 0.85em;
  cursor: pointer;
  transition: var(--transition);
  font-family: inherit;
}
.debug-toggle:hover {
  border-color: var(--magic-purple);
  color: var(--magic-purple);
}
.debug-toggle .arrow {
  transition: var(--transition);
  display: inline-block;
}
.debug-toggle.open .arrow {
  transform: rotate(90deg);
}

.debug-content {
  display: none;
  margin-top: 12px;
  background: rgba(44, 62, 107, 0.04);
  border: 1px solid rgba(139,111,246,0.12);
  border-radius: var(--radius-sm);
  padding: 16px;
  max-height: 400px;
  overflow: auto;
}
.debug-content.open { display: block; }
.debug-content pre {
  font-family: "Cascadia Code", "Fira Code", "JetBrains Mono", "Consolas", monospace;
  font-size: 0.82em;
  line-height: 1.5;
  color: var(--text-dark);
  white-space: pre-wrap;
  word-break: break-all;
}

/* ========== 底部说明 ========== */
.footer {
  margin-top: 40px;
  padding: 24px;
  text-align: center;
  border-top: 1px solid rgba(139,111,246,0.1);
}
.footer p {
  color: var(--text-muted);
  font-size: 0.82em;
  line-height: 1.7;
  max-width: 600px;
  margin: 0 auto;
}
.footer a {
  color: var(--magic-purple);
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .hero { padding: 36px 16px 28px; }
  .hero-title { font-size: 1.7em; letter-spacing: 1px; }
  .hero-subtitle { font-size: 0.92em; }
  .container { padding: 16px 14px 32px; }
  .info-bar { padding: 12px 16px; font-size: 0.85em; gap: 8px 16px; }
  .btn { padding: 12px 24px; font-size: 0.92em; }
  .goods-grid { grid-template-columns: 1fr; gap: 14px; }
  .good-card { padding: 18px 16px; }
}

@media (max-width: 480px) {
  .hero-title { font-size: 1.45em; }
  .hero-title::before, .hero-title::after { display: none; }
  .btn-group { flex-direction: column; align-items: stretch; }
  .btn { text-align: center; }
  .info-bar { flex-direction: column; gap: 6px; text-align: center; }
}

@media (min-width: 1200px) {
  .goods-grid { grid-template-columns: repeat(4, 1fr); }
}

/* ========== 推送控制区 ========== */
.push-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}

.push-toggle {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  user-select: none;
  font-size: 0.92em;
  color: var(--text-dark);
}
.push-toggle__track {
  position: relative;
  width: 44px;
  height: 24px;
  border-radius: 12px;
  background: rgba(139,111,246,0.18);
  transition: var(--transition);
  flex-shrink: 0;
}
.push-toggle__track::after {
  content: '';
  position: absolute;
  top: 3px;
  left: 3px;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  transition: var(--transition);
}
.push-toggle.active .push-toggle__track {
  background: linear-gradient(135deg, var(--magic-purple), var(--gem-blue));
}
.push-toggle.active .push-toggle__track::after {
  left: 23px;
}

.push-status {
  font-size: 0.85em;
  padding: 6px 14px;
  border-radius: 20px;
  display: none;
  align-items: center;
  gap: 6px;
  font-weight: 500;
  animation: fadeInUp 0.3s ease;
}
.push-status.active { display: inline-flex; }
.push-status--ok {
  background: rgba(92,184,92,0.12);
  color: #3d8b3d;
}
.push-status--fail {
  background: var(--error-bg);
  color: #9e5555;
}
.push-status--skip {
  background: rgba(139,111,246,0.08);
  color: var(--text-muted);
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<!-- 背景层 -->
<div class="bg-layer"></div>
<div class="bg-overlay"></div>

<!-- 梦幻光斑 -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- 漂浮魔法粒子（由 JS 生成） -->
<div class="particles" id="particles"></div>

<div class="container">

  <!-- Hero 区域 -->
  <header class="hero">
    <h1 class="hero-title">洛克王国旅行商人查询</h1>
    <p class="hero-subtitle">每日商品、价格、限购与刷新时间一键查看</p>
    <div class="hero-deco">
      <span>✦</span>
      <span>🪙</span>
      <span>🎒</span>
      <span>⭐</span>
      <span>✦</span>
    </div>
  </header>

  <!-- 信息栏 -->
  <div class="info-bar" id="infoBar">
    <div class="info-item">
      <span class="label">当前轮次</span>
      <span class="value" id="roundInfo">--</span>
    </div>
    <div class="info-item">
      <span class="label">轮次时段</span>
      <span class="value--gold" id="roundTime">--</span>
    </div>
    <div class="info-item">
      <span class="label">数据更新</span>
      <span class="value" id="updateTime">尚未查询</span>
    </div>
  </div>

  <!-- 按钮区域 -->
  <div class="btn-group">
    <button class="btn btn-primary" id="btnQuery" onclick="queryMerchant(false)">
      ✦ 查询今日商品
    </button>
    <button class="btn btn-secondary" id="btnRefresh" onclick="queryMerchant(true)">
      ↻ 强制刷新数据
    </button>
  </div>

  <!-- 推送控制区 -->
  <div class="push-bar">
    <label class="push-toggle" id="pushToggle" onclick="togglePush()">
      <span class="push-toggle__track"></span>
      <span>查询后推送到微信</span>
    </label>
    <span class="push-status" id="pushStatus"></span>
  </div>

  <!-- 错误提示 -->
  <div class="error-box" id="errorBox">
    <span class="error-box__icon">⚠</span>
    <div class="error-box__content">
      <div class="error-box__title">查询失败</div>
      <div class="error-box__msg" id="errorMsg"></div>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading-container" id="loading">
    <div class="magic-spinner"></div>
    <span class="loading-text">正在召唤远行商人...</span>
  </div>

  <!-- 空状态 -->
  <div class="empty-state" id="emptyState">
    <div class="empty-state__icon">🏪</div>
    <p class="empty-state__text">暂无商品数据，请点击上方按钮查询。</p>
  </div>

  <!-- 限时商品区域 -->
  <div class="goods-section" id="limitedSection">
    <div class="section-label">
      <span class="icon">⏳</span>
      <span>限时商品</span>
    </div>
    <div class="goods-grid" id="limitedGrid"></div>
  </div>

  <!-- 全天商品区域 -->
  <div class="goods-section" id="alldaySection">
    <div class="section-label">
      <span class="icon">🏷️</span>
      <span>全天售卖</span>
    </div>
    <div class="goods-grid" id="alldayGrid"></div>
  </div>

  <!-- 调试面板 -->
  <div class="debug-panel" id="debugPanel">
    <button class="debug-toggle" id="debugToggle" onclick="toggleDebug()">
      <span class="arrow">▶</span> 原始 JSON 数据
    </button>
    <div class="debug-content" id="debugContent">
      <pre id="debugJson"></pre>
    </div>
  </div>

  <!-- 底部说明 -->
  <footer class="footer">
    <p>
      数据来源：<a href="https://rocom.shallow.ink" target="_blank" rel="noopener">洛克魔法书</a>
      第三方开放 API，数据可能存在延迟或不可用。<br>
      远行商人每日分 4 轮刷新（08:00 / 12:00 / 16:00 / 20:00），非活跃时段无商品。<br>
      本页面仅做数据展示，不存储任何个人信息。
    </p>
  </footer>
</div>

<script>
/* ========== 配置 ========== */
var API_BASE = '/api/merchant';

/* ========== 状态 ========== */
var rawResponseData = null;
var pushEnabled = false;

/* ========== DOM 引用 ========== */
var $btnQuery   = document.getElementById('btnQuery');
var $btnRefresh = document.getElementById('btnRefresh');
var $loading    = document.getElementById('loading');
var $emptyState = document.getElementById('emptyState');
var $errorBox   = document.getElementById('errorBox');
var $errorMsg   = document.getElementById('errorMsg');
var $limitedSection = document.getElementById('limitedSection');
var $alldaySection  = document.getElementById('alldaySection');
var $limitedGrid    = document.getElementById('limitedGrid');
var $alldayGrid     = document.getElementById('alldayGrid');
var $roundInfo  = document.getElementById('roundInfo');
var $roundTime  = document.getElementById('roundTime');
var $updateTime = document.getElementById('updateTime');
var $debugPanel = document.getElementById('debugPanel');
var $debugToggle = document.getElementById('debugToggle');
var $debugContent = document.getElementById('debugContent');
var $debugJson  = document.getElementById('debugJson');

/* ========== 生成漂浮魔法粒子 ========== */
(function createParticles() {
  var container = document.getElementById('particles');
  var types = ['star', 'dot', 'sparkle'];
  for (var i = 0; i < 30; i++) {
    var el = document.createElement('div');
    var t = types[i % 3];
    el.className = 'particle particle--' + t;
    el.style.left = Math.random() * 100 + '%';
    el.style.animationDuration = (8 + Math.random() * 16) + 's';
    el.style.animationDelay = -(Math.random() * 20) + 's';
    el.style.width = el.style.height = (2 + Math.random() * 3) + 'px';
    container.appendChild(el);
  }
})();

/* ========== 轮次计算 ========== */
function getCurrentRound() {
  var h = new Date().getHours();
  if (h >= 8  && h < 12) return { round: 1, label: '第 1 轮 / 共 4 轮', time: '08:00 – 12:00' };
  if (h >= 12 && h < 16) return { round: 2, label: '第 2 轮 / 共 4 轮', time: '12:00 – 16:00' };
  if (h >= 16 && h < 20) return { round: 3, label: '第 3 轮 / 共 4 轮', time: '16:00 – 20:00' };
  if (h >= 20 && h < 24) return { round: 4, label: '第 4 轮 / 共 4 轮', time: '20:00 – 00:00' };
  return { round: 0, label: '非活跃时段', time: '00:00 – 08:00' };
}

function updateRoundDisplay() {
  var r = getCurrentRound();
  $roundInfo.textContent = r.label;
  $roundTime.textContent = r.time;
}
updateRoundDisplay();
setInterval(updateRoundDisplay, 60000);

/* ========== 数据规范化 ========== */

/**
 * normalizeMerchantData - 兼容多种可能的 API 返回结构
 * 输入：API 原始 JSON 对象
 * 输出：标准化的商品数组 [{ name, price, limit, image, desc, startTime, endTime }]
 */
function normalizeMerchantData(data) {
  if (!data) return [];

  var items = [];

  // 从 random_goods 构建名称 -> 价格/限购 映射（该字段含完整商品信息）
  var goodsLookup = {};
  var randomGoods = data.random_goods || data.randomGoods || [];
  if (Array.isArray(randomGoods)) {
    randomGoods.forEach(function(g) {
      var key = (g.goods_name || g.name || '').trim();
      if (key) {
        goodsLookup[key] = {
          price: g.price || g.origin_price || null,
          limit: g.buy_limit_num || g.buyLimit || null,
          itemId: g.item_id || g.id || null
        };
      }
    });
  }

  // 路径 1：data.merchantActivities[].get_props[]（已确认的主结构）
  var activities = data.merchantActivities || data.merchant_activities || data.activities;
  if (Array.isArray(activities)) {
    activities.forEach(function(act) {
      var props = act.get_props || act.getProps || act.props || act.items || act.goods || [];
      if (Array.isArray(props)) {
        props.forEach(function(p) { items.push(p); });
      }
    });
  }

  // 路径 2：data.items / data.goods / data.list 扁平数组
  if (items.length === 0) {
    var flat = data.items || data.goods || data.list || data.products || data.props;
    if (Array.isArray(flat)) {
      items = flat;
    }
  }

  // 路径 3：data 本身就是数组
  if (items.length === 0 && Array.isArray(data)) {
    items = data;
  }

  // 对每个商品进行字段标准化，并用 random_goods 补全价格/限购
  return items.map(function(raw) {
    var name = raw.name || raw.title || raw.itemName || raw.goodsName || raw.item_name || raw.goods_name || '未知商品';
    var extra = goodsLookup[name] || {};

    return {
      name:      name,
      price:     raw.price || raw.cost || raw.value || raw.need || extra.price || null,
      limit:     raw.limit || raw.buyLimit || raw.buy_limit || raw.stock || raw.max || extra.limit || null,
      image:     raw.image || raw.icon || raw.img || raw.imgUrl || raw.iconUrl || raw.img_url || raw.icon_url || null,
      desc:      raw.desc || raw.description || raw.type || raw.category || null,
      startTime: raw.start_time || raw.startTime || raw.begin_time || raw.beginTime || 0,
      endTime:   raw.end_time || raw.endTime || raw.finish_time || raw.finishTime || 0,
      id:        raw._id || raw.id || null,
      _raw:      raw
    };
  });
}

/* ========== 商品分类：限时 vs 全天 ========== */
function classifyItems(items) {
  var now = Date.now();
  var active = items.filter(function(item) {
    if (!item.startTime || !item.endTime) return true;
    return item.startTime <= now && now <= item.endTime;
  });

  var limited = [];
  var allday = [];

  active.forEach(function(item) {
    if (isLimitedTime(item)) {
      limited.push(item);
    } else {
      allday.push(item);
    }
  });

  return { limited: limited, allday: allday };
}

function isLimitedTime(item) {
  if (!item.startTime || !item.endTime) return false;
  var start = new Date(item.startTime);
  var end = new Date(item.endTime);
  if (start.getHours() < 7 && end.getHours() === 23 && end.getMinutes() >= 50) {
    return false;
  }
  return true;
}

/* ========== 格式化时间 ========== */
function formatTime(ts) {
  if (!ts) return '--';
  var d = new Date(ts);
  var hh = String(d.getHours()).padStart(2, '0');
  var mm = String(d.getMinutes()).padStart(2, '0');
  return hh + ':' + mm;
}

function formatDateTime(date) {
  var d = date || new Date();
  var y = d.getFullYear();
  var M = String(d.getMonth() + 1).padStart(2, '0');
  var D = String(d.getDate()).padStart(2, '0');
  var h = String(d.getHours()).padStart(2, '0');
  var m = String(d.getMinutes()).padStart(2, '0');
  var s = String(d.getSeconds()).padStart(2, '0');
  return y + '-' + M + '-' + D + ' ' + h + ':' + m + ':' + s;
}

/* ========== 商品图标映射 ========== */
function getItemIcon(item) {
  if (item.image) return null;
  var name = (item.name || '').toLowerCase();
  if (name.indexOf('球') !== -1) return '🔮';
  if (name.indexOf('蛋') !== -1) return '🥚';
  if (name.indexOf('药') !== -1 || name.indexOf('秘药') !== -1) return '🧪';
  if (name.indexOf('血脉') !== -1) return '💎';
  if (name.indexOf('石') !== -1) return '💠';
  if (name.indexOf('果') !== -1 || name.indexOf('果实') !== -1) return '🍎';
  if (name.indexOf('书') !== -1 || name.indexOf('秘籍') !== -1) return '📖';
  if (name.indexOf('卷') !== -1) return '📜';
  if (name.indexOf('币') !== -1 || name.indexOf('金') !== -1) return '🪙';
  if (name.indexOf('钥匙') !== -1) return '🗝️';
  if (name.indexOf('精灵') !== -1) return '🌟';
  if (name.indexOf('碎片') !== -1) return '✨';
  return '📦';
}

/* ========== 渲染商品卡片 ========== */
function renderItemCard(item) {
  var card = document.createElement('div');
  card.className = 'good-card';

  var iconEmoji = getItemIcon(item);
  var iconHTML = '';
  if (item.image) {
    iconHTML = '<div class="good-card__icon"><img src="' + escapeHtml(item.image) + '" alt="" style="width:36px;height:36px;object-fit:contain;border-radius:6px;" onerror="this.parentElement.textContent=\'📦\'"></div>';
  } else {
    iconHTML = '<div class="good-card__icon">' + iconEmoji + '</div>';
  }

  var nameHTML = '<div class="good-card__name">' + escapeHtml(item.name) + '</div>';

  var metaHTML = '<div class="good-card__meta">';

  if (item.startTime && item.endTime) {
    var timeText = formatTime(item.startTime) + ' – ' + formatTime(item.endTime);
    metaHTML += '<span class="good-card__tag tag--time">⏰ ' + timeText + '</span>';
  }

  if (isLimitedTime(item)) {
    metaHTML += '<span class="good-card__tag tag--limited">⚡ 限时商品</span>';
  } else if (item.startTime) {
    metaHTML += '<span class="good-card__tag tag--allday">☀️ 全天售卖</span>';
  }

  if (item.price !== null && item.price !== undefined) {
    metaHTML += '<span class="good-card__tag tag--price">🪙 ' + escapeHtml(String(item.price)) + '</span>';
  }

  if (item.limit !== null && item.limit !== undefined) {
    metaHTML += '<span class="good-card__tag tag--limit">📦 限购 ' + escapeHtml(String(item.limit)) + '</span>';
  }

  if (item.desc) {
    metaHTML += '<span class="good-card__tag tag--desc">' + escapeHtml(item.desc) + '</span>';
  }

  metaHTML += '</div>';

  card.innerHTML = iconHTML + nameHTML + metaHTML;
  return card;
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ========== 渲染商品列表 ========== */
function renderGoods(items) {
  var classified = classifyItems(items);

  // 限时商品
  $limitedGrid.innerHTML = '';
  if (classified.limited.length > 0) {
    $limitedSection.classList.add('active');
    classified.limited.forEach(function(item) {
      $limitedGrid.appendChild(renderItemCard(item));
    });
  } else {
    $limitedSection.classList.remove('active');
  }

  // 全天商品
  $alldayGrid.innerHTML = '';
  if (classified.allday.length > 0) {
    $alldaySection.classList.add('active');
    classified.allday.forEach(function(item) {
      $alldayGrid.appendChild(renderItemCard(item));
    });
  } else {
    $alldaySection.classList.remove('active');
  }

  // 如果都为空但有原始数据，把所有商品显示为限时
  if (classified.limited.length === 0 && classified.allday.length === 0 && items.length > 0) {
    $limitedSection.classList.add('active');
    items.forEach(function(item) {
      $limitedGrid.appendChild(renderItemCard(item));
    });
  }
}

/* ========== 状态切换 ========== */
function showLoading() {
  $loading.classList.add('active');
  $emptyState.style.display = 'none';
  $errorBox.classList.remove('active');
  $limitedSection.classList.remove('active');
  $alldaySection.classList.remove('active');
  $debugPanel.classList.remove('active');
}

function hideLoading() {
  $loading.classList.remove('active');
}

function showError(msg) {
  hideLoading();
  $errorBox.classList.add('active');
  $errorMsg.textContent = msg;
  $emptyState.style.display = 'none';
}

function showEmpty() {
  hideLoading();
  $emptyState.style.display = '';
  $errorBox.classList.remove('active');
  $limitedSection.classList.remove('active');
  $alldaySection.classList.remove('active');
}

function setButtonsDisabled(disabled) {
  $btnQuery.disabled = disabled;
  $btnRefresh.disabled = disabled;
  if (disabled) {
    $btnQuery.innerHTML = '<span class="magic-spinner" style="width:18px;height:18px;display:inline-block;vertical-align:middle;margin-right:6px;"></span> 查询中...';
    $btnRefresh.innerHTML = '↻ 请稍候...';
  } else {
    $btnQuery.innerHTML = '✦ 查询今日商品';
    $btnRefresh.innerHTML = '↻ 强制刷新数据';
  }
}

/* ========== 推送开关 ========== */
var $pushToggle = document.getElementById('pushToggle');
var $pushStatus = document.getElementById('pushStatus');

function togglePush() {
  pushEnabled = !pushEnabled;
  $pushToggle.classList.toggle('active', pushEnabled);
}

function showPushStatus(type, text) {
  $pushStatus.className = 'push-status active push-status--' + type;
  $pushStatus.textContent = text;
  setTimeout(function() { $pushStatus.classList.remove('active'); }, 8000);
}

/* ========== 主查询函数 ========== */
function queryMerchant(forceRefresh) {
  setButtonsDisabled(true);
  showLoading();
  $pushStatus.classList.remove('active');

  var url = API_BASE + '?refresh=' + (forceRefresh ? 'true' : 'false');
  if (pushEnabled) url += '&push=true';

  fetch(url, { method: 'GET', headers: { 'Accept': 'application/json' } })
  .then(function(response) {
    return response.json().then(function(json) {
      return { status: response.status, ok: response.ok, json: json };
    });
  })
  .then(function(result) {
    rawResponseData = result.json;
    hideLoading();

    // 后端代理返回的错误状态码
    if (!result.ok) {
      var errorMap = {
        401: 'API Key 缺失或无权限，请检查服务端 .env 配置。',
        403: 'API Key 无权限访问此接口，请确认 Key 是否正确。',
        429: '请求过于频繁，请稍后再试。',
        500: '服务端配置错误，请检查 .env 中的 ROCOM_API_KEY。',
        502: '无法连接第三方接口，服务可能暂时不可用。'
      };
      var msg = result.json.message || errorMap[result.status] || '查询失败（HTTP ' + result.status + '）';
      showError(msg);
      showDebugPanel(result.json);
      setButtonsDisabled(false);
      return;
    }

    var json = result.json;

    // 检查 API 返回码
    if (json.code !== undefined && json.code !== 0) {
      showError('API 返回错误：' + (json.message || json.msg || '未知错误') + ' (code: ' + json.code + ')');
      showDebugPanel(json);
      setButtonsDisabled(false);
      return;
    }

    // 提取 data
    var dataPayload = json.data || json;
    var items = normalizeMerchantData(dataPayload);

    if (items.length === 0) {
      showEmpty();
      $emptyState.querySelector('.empty-state__text').textContent =
        getCurrentRound().round === 0
          ? '当前为非活跃时段（00:00 – 08:00），远行商人正在休息中。'
          : '暂无商品数据，远行商人可能还未上架商品，请稍后再试。';
      showDebugPanel(json);
    } else {
      $emptyState.style.display = 'none';
      $errorBox.classList.remove('active');
      renderGoods(items);
      showDebugPanel(json);
    }

    // 处理推送状态
    var ps = json.pushStatus;
    if (ps) {
      if (ps.success) {
        showPushStatus('ok', '✓ 已推送到微信');
      } else if (ps.reason === 'not_configured') {
        showPushStatus('skip', '未配置 SendKey，推送已跳过');
      } else {
        showPushStatus('fail', '推送失败：' + (ps.reason || '未知错误'));
      }
    }

    $updateTime.textContent = formatDateTime(new Date());
    updateRoundDisplay();
    setButtonsDisabled(false);
  })
  .catch(function(err) {
    hideLoading();
    var friendlyMsg = '查询失败，无法连接服务端。请确认服务已启动（npm start）。';
    if (err.message) {
      friendlyMsg += '\n技术详情：' + err.message;
    }
    showError(friendlyMsg);
    setButtonsDisabled(false);

    if (rawResponseData) {
      showDebugPanel(rawResponseData);
    }
  });
}

/* ========== 调试面板 ========== */
function showDebugPanel(data) {
  $debugPanel.classList.add('active');
  $debugJson.textContent = JSON.stringify(data, null, 2);
}

function toggleDebug() {
  var isOpen = $debugContent.classList.toggle('open');
  $debugToggle.classList.toggle('open', isOpen);
}
</script>
</body>
</html>
